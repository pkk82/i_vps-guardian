---
- hosts: remotes
  remote_user: "{{ansible_ssh_user}}"
  become: true
  become_user: postgres
  gather_facts: no
  tasks:

    - name: Remove directory contents
      file:
        path: "{{pg_backup_output_dir}}"
        state: absent
      become_user: root

    - name: Recreate empty directory
      file:
        path: "{{pg_backup_output_dir}}"
        state: directory
        mode: 0755
        owner: postgres
      become: true
      become_user: root

    # When invoked from 02-pg-reinstall.yml, pg_reinstall_backup_basename was set
    # by the backup play earlier in this same run, so we restore exactly that
    # file. Standalone restores (02-pg-restore.yml / 02-pg-wipe-restore.yml) leave
    # it undefined and fall back to the latest backup in Dropbox.
    - name: Determine which backup to restore
      ansible.builtin.shell: |
        set -o pipefail
        if [ -n "{{ pg_reinstall_backup_basename | default('') }}" ]; then
          echo "{{ pg_reinstall_backup_basename }}"
        else
          python3 ~/dropbox_script.py list | grep "pg-backup.*\.gz$" | sort | tail -n 1
        fi
      args:
        executable: /bin/bash
      register: restore_target
      environment:
        DROPBOX_APP_KEY: "{{dropbox_pg_backuper_app_key}}"
        DROPBOX_APP_SECRET: "{{dropbox_pg_backuper_app_secret}}"
        DROPBOX_REFRESH_TOKEN: "{{dropbox_pg_backuper_refresh_token}}"

    - name: Fail if no backup could be selected
      ansible.builtin.fail:
        msg: "No backup file could be determined for restore."
      when: (restore_target.stdout | trim) == ""

    - name: Set backup filename to restore
      ansible.builtin.set_fact:
        restore_basename: "{{ restore_target.stdout | trim }}"

    - name: Download the selected backup and its checksum
      ansible.builtin.shell: "python3 ~/dropbox_script.py download {{pg_backup_output_dir}} {{restore_basename}} {{restore_basename}}.sha512"
      register: download_output
      environment:
        DROPBOX_APP_KEY: "{{dropbox_pg_backuper_app_key}}"
        DROPBOX_APP_SECRET: "{{dropbox_pg_backuper_app_secret}}"
        DROPBOX_REFRESH_TOKEN: "{{dropbox_pg_backuper_refresh_token}}"

    - name: Print download output
      ansible.builtin.debug:
        var: download_output.stdout

    - name: Check signature
      ansible.builtin.shell: "sha512sum -c {{pg_backup_output_dir}}/{{restore_basename}}.sha512"

    - name: Restore Postgresql data
      ansible.builtin.shell: |
        set -o pipefail
        gunzip -c {{pg_backup_output_dir}}/{{restore_basename}} \
          | sed -E '/^CREATE ROLE "?postgres"?;$/d' \
          | psql -v ON_ERROR_STOP=1
      args:
        executable: /bin/bash
