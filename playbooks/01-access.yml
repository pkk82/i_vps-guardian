---
- hosts: remotes
  remote_user: "{{ansible_ssh_user}}"
  gather_facts: no
  tasks:

  - name: Install `sudo`
    package:
      name: sudo
      state: latest

  - name: Make sure there is a 'sudo' group
    group:
      name: sudo
      state: present

  - name: Create pkk82 user
    user:
      name: pkk82
      comment: Piotr Kozak
      shell: /bin/bash
      groups:
        - sudo
        - docker

  - name: Add authorized key for pkk82 account (pkk82@d2018-linux)
    authorized_key:
      user: pkk82
      state: present
      key: ssh-rsa  pkk82@d2018-linux

  - name: Add authorized key for pkk82 account (pkk@l2026-mac)
    authorized_key:
      user: pkk82
      state: present
      key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGFEF6pojujUn+Sg8C5CR3OpowIeQ3bz6IN9tUPQizS6 pkk@l2026-mac

  - name: Allow pkk82 user to use sudo passwordless
    copy:
      src:  "{{inventory_dir}}/files/sudoers-pkk82"
      dest: /etc/sudoers.d/sudoers-pkk82
      mode: 0440

