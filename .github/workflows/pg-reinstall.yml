name: Reinstall Postgresql in VPS

on:
  schedule:
    - cron: '0 5 * * 6'
  workflow_dispatch:

# Serialize against pg-backup (shared group) so the two never overlap on the VPS.
concurrency:
  group: postgres-mikr-us-k122
  cancel-in-progress: false

jobs:
  pg-reinstall:
    runs-on: ubuntu-latest
    # Normal runs take ~12 min; cap runaway hangs (observed up to 6h) so a stuck
    # reinstall can't straddle multiple backup windows.
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Reinstall Postgresql
        uses: ./.github/actions/ansible
        with:
          vault_pass_mikr_us_k122: ${{ secrets.VAULT_PASS_MIKR_US_K122 }}
          vault_pass_all: ${{ secrets.VAULT_PASS_ALL }}
          playbook: ./playbooks/02-pg-reinstall.yml
